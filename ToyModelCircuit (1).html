    "I→II": {bg:"#1c1400",border:"#d97706",text:"#fbbf24"},
    "II":   {bg:"#2d0a0a",border:"#dc2626",text:"#f87171"},
    "III":  {bg:"#1a0000",border:"#7f1d1d",text:"#fca5a5"},
  };
  const c = colors[zone] || colors["I"];
  return (
    <span style={{background:c.bg,border:`1px solid ${c.border}`,color:c.text,
      borderRadius:4,padding:"2px 10px",fontSize:11,letterSpacing:1,fontWeight:700}}>
      ZONE {zone}
    </span>
  );
}

function Meter({ label, value, max, min=0, color }) {
  const pct = Math.max(0, Math.min(100, ((value - min) / (max - min)) * 100));
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{color:"#94a3b8",fontSize:11}}>{label}</span>
        <span style={{color,fontSize:13,fontWeight:700}}>{fmt(value)}</span>
      </div>
      <div style={{background:"#1e293b",borderRadius:3,height:6,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:color,transition:"width 0.6s ease",borderRadius:3}}/>
      </div>
    </div>
  );
}

function BalanceRow({ label, value, color, indent=false, highlight=false }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",
      paddingLeft:indent?12:0, borderBottom:highlight?`1px solid ${color}22`:"none"}}>
      <span style={{color:"#94a3b8",fontSize:11}}>{indent?"↳ ":""}{label}</span>
      <span style={{color:highlight?color:"#cbd5e1",fontSize:12,fontWeight:highlight?700:400}}>
        {value>=0?"$":"-$"}{Math.abs(value)}
      </span>
    </div>
  );
}

function FlowItem({ flow }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",marginBottom:3,
      background:`${flow.color}11`,borderLeft:`2px solid ${flow.color}`,borderRadius:"0 4px 4px 0"}}>
      <span style={{color:flow.color,fontSize:11,fontWeight:700,minWidth:36}}>${flow.amt}</span>
      <span style={{color:"#94a3b8",fontSize:10}}>{flow.from} → {flow.to}</span>
      <span style={{color:"#64748b",fontSize:10,marginLeft:"auto"}}>{flow.label}</span>
    </div>
  );
}

function NIIPChart({ rounds, currentR }) {
  const w=500, h=120, pad={t:10,r:10,b:25,l:55};
  const iW=w-pad.l-pad.r, iH=h-pad.t-pad.b;
  const minN=-1100, maxN=0;
  const xS=(i)=>pad.l+(i/(rounds.length-1))*iW;
  const yS=(v)=>pad.t+((v-maxN)/(minN-maxN))*iH;
  const niipPts=rounds.map((rd,i)=>`${xS(i)},${yS(rd.niip)}`).join(" ");
  const ticPts=rounds.map((rd,i)=>`${xS(i)},${yS(-rd.tic_total)}`).join(" ");
  return (
    <svg width={w} height={h} style={{display:"block",maxWidth:"100%"}}>
      {[-200,-400,-600,-800,-1000].map(v=>(
        <g key={v}>
          <line x1={pad.l} y1={yS(v)} x2={w-pad.r} y2={yS(v)} stroke="#1e293b" strokeWidth={1}/>
          <text x={pad.l-4} y={yS(v)+4} textAnchor="end" fontSize={8} fill="#475569" fontFamily="monospace">{v}</text>
        </g>
      ))}
      <polyline points={niipPts} fill="none" stroke="#ef4444" strokeWidth={2} strokeLinecap="round"/>
      <polyline points={ticPts} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="4 2"/>
      {rounds.map((rd,i)=>{
        const active=rd.r===currentR;
        return <circle key={String(rd.r)} cx={xS(i)} cy={yS(rd.niip)} r={active?5:2.5}
          fill={active?"#ef4444":PHASES[getPhase(rd.r)].color} stroke={active?"#fff":"none"} strokeWidth={active?1.5:0}/>;
      })}
      {rounds.map((rd,i)=>(
        <text key={String(rd.r)} x={xS(i)} y={h-4} textAnchor="middle" fontSize={8}
          fill={rd.r===currentR?"#f8fafc":"#475569"} fontFamily="monospace" fontWeight={rd.r===currentR?700:400}>
          R{rd.r}
        </text>
      ))}
      <line x1={w-130} y1={15} x2={w-115} y2={15} stroke="#ef4444" strokeWidth={2}/>
      <text x={w-112} y={19} fontSize={8} fill="#94a3b8" fontFamily="monospace">NIIP (true)</text>
      <line x1={w-130} y1={27} x2={w-115} y2={27} stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="4 2"/>
      <text x={w-112} y={31} fontSize={8} fill="#94a3b8" fontFamily="monospace">TIC reported</text>
    </svg>
  );
}

function StackedBar({ round }) {
  const entities=[
    {label:"BoJ direct",value:round.boj_direct,color:"#22c55e"},
    {label:"BoJ GlobalBank",value:round.boj_globalbank,color:"#3b82f6"},
    {label:"BoJ EuroCustody",value:round.boj_eurocustody,color:"#f97316"},
    {label:"BoF",value:round.bof,color:"#a78bfa"},
    {label:"OilCo direct",value:round.oilco_direct,color:"#fbbf24"},
    {label:"OilCo HedgeCo",value:round.oilco_hedgeco,color:"#8b5cf6"},
    {label:"OilCo AfricaCo",value:round.oilco_africaco,color:"#6b7280"},
  ];
  const total=entities.reduce((s,e)=>s+e.value,0);
  return (
    <div>
      <div style={{display:"flex",height:24,borderRadius:4,overflow:"hidden",marginBottom:8}}>
        {entities.filter(e=>e.value>0).map(e=>(
          <div key={e.label} style={{width:`${(e.value/total)*100}%`,background:e.color,transition:"width 0.5s ease"}} title={`${e.label}: $${e.value}`}/>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px"}}>
        {entities.filter(e=>e.value>0).map(e=>(
          <div key={e.label} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,background:e.color}}/>
            <span style={{color:"#94a3b8",fontSize:10}}>{e.label} <span style={{color:"#e2e8f0"}}>${e.value}</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

                </div>
              ))}
              <div style={{marginTop:8,padding:"6px 10px",background:"#1a0a0a",border:"1px solid #7f1d1d",
                borderRadius:4,color:"#fca5a5",fontSize:9,lineHeight:1.5}}>
                Source: Barth, Beltran et al. (Fed FEDS Note, Oct 2025) -- Cayman hedge funds undercounted in TIC by ~$1.4T as of end-2024.
              </div>
            </div>
          )}

          {/* Fed visibility panel */}
          <div style={{marginBottom:16,background:"#080d18",
            border:`1px solid ${rd.tic_gap>0?"#f59e0b44":"#1e293b"}`,borderRadius:6,padding:12}}>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:8}}>WHAT THE FED CAN SEE vs REALITY</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div style={{background:"#0d1424",borderRadius:4,padding:8}}>
                <div style={{color:"#22c55e",fontSize:9,marginBottom:4}}>FED SEES (TIC data)</div>
                {[
                  {label:"Total foreign demand",value:`$${rd.tic_total}B`},
                  {label:"Cayman holdings",value:`$${rd.r>=7?423:0}B (stated)`},
                  {label:"Basis trade exposure",value:rd.tic_gap>0?"NOT VISIBLE":"$0"},
                ].map(item=>(
                  <div key={item.label} style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{color:"#475569",fontSize:9}}>{item.label}</span>
                    <span style={{color:item.value==="NOT VISIBLE"?"#ef4444":"#94a3b8",fontSize:9,fontFamily:"monospace"}}>{item.value}</span>
                  </div>
                ))}
              </div>
              <div style={{background:"#0d1424",borderRadius:4,padding:8}}>
                <div style={{color:"#ef4444",fontSize:9,marginBottom:4}}>REALITY</div>
                {[
                  {label:"True external liabilities",value:`$${Math.abs(rd.niip)}B`},
                  {label:"HedgeCo actual holdings",value:`$${rd.hedgeco_tbills}B`,warn:rd.hedgeco_tbills>0},
                  {label:"TIC gap (invisible)",value:`$${rd.tic_gap}B`,warn:rd.tic_gap>0},
                ].map(item=>(
                  <div key={item.label} style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{color:"#475569",fontSize:9}}>{item.label}</span>
                    <span style={{color:item.warn?"#f59e0b":"#94a3b8",fontSize:9,fontFamily:"monospace",fontWeight:item.warn?700:400}}>{item.value}</span>
                  </div>
                ))}
              </div>
            </div>
            {rd.tic_gap>0 && (
              <div style={{padding:"5px 10px",borderRadius:4,
                background:rd.r===16?"#0a0505":"#0d1000",
                border:`1px solid ${rd.r===16?"#7f1d1d":"#365314"}`,
                color:rd.r===16?"#fca5a5":"#86efac",fontSize:9,lineHeight:1.5}}>
                {rd.r===16
                  ? `⚠ UNWIND IN PROGRESS: HedgeCo sold $32. FedCo absorbed. Balance sheet expanded $70 (23% of Y_AmeriCo). Toy κ=${rd.toy_kappa||"n/a"}. The Fed absorbed the crisis it could not see building.`
                  : `Invisible exposure: $${rd.tic_gap}B. If stress forces HedgeCo unwind, Fed must absorb $${rd.hedgeco_tbills}B with no advance warning. Real-world equivalent: $1.4T invisible, $1.85T unwind exposure.`
                }
              </div>
            )}
          </div>

          {/* Balance sheets */}
          <div>
            <div style={{color:"#64748b",fontSize:10,letterSpacing:2,marginBottom:10}}>BALANCE SHEETS — END OF ROUND {rd.r}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:6,padding:10}}>
                <div style={{color:"#22c55e",fontSize:10,marginBottom:8,letterSpacing:1}}>BOJ (JapanCo CB)</div>
                <BalanceRow label="Direct T-bills (NY Fed)" value={rd.boj_direct} color="#22c55e" highlight/>
                <BalanceRow label="SDDD floor (locked)" value={-rd.sddd_floor} color="#f59e0b" indent/>
                <BalanceRow label="IDD free" value={rd.boj_direct-rd.sddd_floor} color="#22c55e" indent/>
                <BalanceRow label="Via GlobalBankCo" value={rd.boj_globalbank} color="#3b82f6"/>
                <BalanceRow label="Via EuroCustodyCo" value={rd.boj_eurocustody} color="#f97316"/>
                <div style={{borderTop:"1px solid #1e293b",marginTop:6,paddingTop:6}}>
                  <BalanceRow label="TOTAL" value={rd.boj_total} color="#f8fafc" highlight/>
                </div>
                <div style={{marginTop:4,color:"#475569",fontSize:9}}>
                  TIC: ${rd.boj_direct} (Japan) + ${rd.boj_globalbank} (UK) + ${rd.boj_eurocustody} (Belgium)
                </div>
              </div>
              <div style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:6,padding:10}}>
                <div style={{color:"#fbbf24",fontSize:10,marginBottom:8,letterSpacing:1}}>OILCO</div>
                <BalanceRow label="Direct T-bills" value={rd.oilco_direct} color="#fbbf24" highlight/>
                <BalanceRow label="HedgeCo equity (NAV)" value={rd.oilco_hedgeco} color="#8b5cf6"/>
                <BalanceRow label="AfricaCo loan" value={rd.oilco_africaco} color="#6b7280"/>
                <div style={{borderTop:"1px solid #1e293b",marginTop:6,paddingTop:6}}>
                  <BalanceRow label="TOTAL" value={rd.oilco_direct+rd.oilco_hedgeco+rd.oilco_africaco} color="#f8fafc" highlight/>
                </div>
                <div style={{marginTop:4,color:"#475569",fontSize:9}}>TIC visible: ${rd.oilco_direct} only.</div>
              </div>
              <div style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:6,padding:10}}>
                <div style={{color:"#8b5cf6",fontSize:10,marginBottom:8,letterSpacing:1}}>HEDGECO (Cayman)</div>
                <BalanceRow label="T-bills (basis trade)" value={rd.hedgeco_tbills} color="#8b5cf6" highlight/>
                <BalanceRow label="Repo liability" value={-rd.hedgeco_repo} color="#ef4444"/>
                <div style={{borderTop:"1px solid #1e293b",marginTop:6,paddingTop:6}}>
                  <BalanceRow label="NAV (= OilCo equity)" value={rd.hedgeco_tbills-rd.hedgeco_repo} color="#f8fafc" highlight/>
                </div>
                <div style={{marginTop:4,color:"#ef4444",fontSize:9}}>TIC: $0 — repo collateral transfer breaks chain</div>
              </div>
              <div style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:6,padding:10}}>
                <div style={{color:"#3b82f6",fontSize:10,marginBottom:8,letterSpacing:1}}>INTERMEDIARIES</div>
                <BalanceRow label="GlobalBankCo T-bills" value={rd.globalbank_tbills} color="#3b82f6" highlight/>
                <BalanceRow label="Deposit owed to BoJ" value={-rd.globalbank_tbills} color="#ef4444" indent/>
                <BalanceRow label="EuroCustodyCo (custodial)" value={rd.eurocustody_tbills} color="#f97316" highlight/>
                <BalanceRow label="Beneficial owner: BoJ" value={-rd.eurocustody_tbills} color="#f97316" indent/>
                <div style={{marginTop:6,color:"#475569",fontSize:9}}>TIC: GlobalBankCo→UK | EuroCustodyCo→Belgium</div>
              </div>
            </div>

            {/* AmeriCo summary */}
            <div style={{marginTop:8,background:"#0d1424",border:"1px solid #ef444433",borderRadius:6,padding:10}}>
              <div style={{color:"#ef4444",fontSize:10,marginBottom:8,letterSpacing:1}}>AMERCO — EXTERNAL LIABILITIES (NIIP)</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#64748b",fontSize:9,marginBottom:2}}>TRUE NIIP</div>
                  <div style={{color:"#ef4444",fontSize:16,fontWeight:700}}>{fmtB(rd.niip)}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#64748b",fontSize:9,marginBottom:2}}>TIC REPORTED</div>
                  <div style={{color:"#3b82f6",fontSize:16,fontWeight:700}}>-{fmtB(rd.tic_total)}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#64748b",fontSize:9,marginBottom:2}}>INVISIBLE STOCK</div>
                  <div style={{color:rd.tic_gap>0?"#f59e0b":"#22c55e",fontSize:16,fontWeight:700}}>
                    {rd.tic_gap>0?`-$${rd.tic_gap}B`:"$0"}
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid #1e293b",padding:"8px 20px",display:"flex",
        justifyContent:"space-between",alignItems:"center",background:"#080d18",flexWrap:"wrap",gap:4}}>
        <div style={{color:"#334155",fontSize:9}}>
          SDDD: Venugopal (2026) "The Dollar Conveyor" v4.0 · TIC gap: Barth & Beltran et al., Fed FEDS Note, Oct 2025
        </div>
        <div style={{color:"#334155",fontSize:9}}>Toy model for The Stock Elephant Part II · @Vinodh_Rag</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
